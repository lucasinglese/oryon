site_name: Oryon Docs
site_description: "Institutional-grade feature and target engineering for quantitative research. Rust core, Python API."
site_url: https://oryonlib.dev

repo_url: https://github.com/lucasinglese/oryon
repo_name: lucasinglese/oryon
use_directory_urls: true

theme:
  name: material
  custom_dir: overrides
  logo: assets/figures/oryon_logo_text.svg
  favicon: assets/figures/oryon_diamond_dot_square.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.tabs
    - content.code.copy
    - content.code.annotation
  language: en
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Streaming vs Research: getting-started/streaming-vs-research.md
      - NaN Convention: getting-started/nan-convention.md
  - API Reference:
      - Features:
          - Trend: api/features/trend.md
          - Volatility: api/features/volatility.md
          - Statistics: api/features/statistics.md
          - Returns: api/features/returns.md
      - Targets:
          - Regressions: api/targets/regressions.md
          - Volatility: api/targets/volatility.md
      - Pipelines: api/pipelines.md
  - Contributing:
      - How to Contribute: contributing/guide.md
      - Architecture: contributing/architecture.md
      - Doc Templates: contributing/doc-templates.md
      - Test Templates: contributing/test-templates.md
  - Benchmarks: benchmarks.md

hooks:
  - hooks.py

plugins:
  - search
  - social
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: ["../python"]
          options:
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source
            docstring_style: numpy
            merge_init_into_class: true
            show_if_no_docstring: false

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
      pygments_style: gruvbox-dark
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - md_in_html
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      toc_depth: 2

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML

extra_css:
  - stylesheets/custom.css

extra:
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/lucasinglese/oryon
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/lucas-inglese-75574817b/

copyright: |
  &copy; 2026 Oryon

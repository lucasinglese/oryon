[project]
name = "oryon"
version = "0.0.1"
description = "Institutional-grade feature and target engineering for quantitative research."
authors = [
    {name = "Lucas Inglese", email = "lucas.inglese.pro@gmail.com"}
]
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.13, <4.0"
dependencies = [
    "pandas (>=3.0.1,<4.0.0)",
]

[tool.poetry]
packages = [{include = "oryon", from = "python"}]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "ruff (>=0.15.2,<0.16.0)",
    "pytest (>=9.0.2,<10.0.0)",
    "mypy (>=1.0.0,<2.0.0)",
    "pandas-stubs",
    "pytest-cov (>=7.0.0,<8.0.0)",
    "pytest-benchmark (>=5.2.0,<6.0.0)",
    "maturin (>=1.8.0,<2.0.0)",
]

[tool.ruff]
line-length = 120
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--benchmark-disable"